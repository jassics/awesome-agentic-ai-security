<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="340" viewBox="0 0 1280 340" role="img" aria-label="Awesome Agentic AI Security">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0b1020"/>
      <stop offset="0.5" stop-color="#111a3a"/>
      <stop offset="1" stop-color="#1b0f2e"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#38bdf8"/>
      <stop offset="0.5" stop-color="#818cf8"/>
      <stop offset="1" stop-color="#c084fc"/>
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="6" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="1280" height="340" fill="url(#bg)"/>

  <!-- subtle grid -->
  <g stroke="#2a3566" stroke-width="1" opacity="0.25">
    <path d="M0 60 H1280 M0 120 H1280 M0 180 H1280 M0 240 H1280 M0 300 H1280"/>
    <path d="M160 0 V340 M320 0 V340 M480 0 V340 M960 0 V340 M1120 0 V340"/>
  </g>

  <!-- agent network / nodes -->
  <g fill="none" stroke="url(#accent)" stroke-width="2" opacity="0.9">
    <line x1="960" y1="90"  x2="1080" y2="140"/>
    <line x1="1080" y1="140" x2="1010" y2="240"/>
    <line x1="960" y1="90"  x2="1010" y2="240"/>
    <line x1="1080" y1="140" x2="1180" y2="200"/>
    <line x1="1010" y1="240" x2="1140" y2="270"/>
  </g>
  <g filter="url(#glow)">
    <circle cx="960"  cy="90"  r="10" fill="#38bdf8"/>
    <circle cx="1080" cy="140" r="14" fill="#818cf8"/>
    <circle cx="1010" cy="240" r="10" fill="#c084fc"/>
    <circle cx="1180" cy="200" r="8"  fill="#38bdf8"/>
    <circle cx="1140" cy="270" r="7"  fill="#c084fc"/>
  </g>

  <!-- shield mark -->
  <g transform="translate(1080,140)">
    <path d="M0 -22 L18 -13 V6 C18 20 8 27 0 30 C-8 27 -18 20 -18 6 V-13 Z"
          fill="#0b1020" stroke="#e2e8f0" stroke-width="2.5"/>
    <path d="M-7 2 L-1 9 L9 -6" fill="none" stroke="#38bdf8" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- text -->
  <text x="90" y="150" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="64" font-weight="800" fill="#f8fafc">Awesome</text>
  <text x="90" y="222" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="64" font-weight="800" fill="url(#accent)">Agentic AI Security</text>
  <text x="94" y="272" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="23" font-weight="500" fill="#94a3b8">Agentic AI · Agentic Engineering · Securing Autonomous Agents</text>
  <rect x="94" y="285" width="470" height="4" rx="2" fill="url(#accent)"/>
</svg>
